name: ora
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.8
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  table_calendar: ^3.1.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  firebase_storage: ^13.2.0
  file_picker: ^10.3.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.17.0
  latlong2: ^0.9.1
  flutter_map: ^6.1.0
  speech_to_text: ^7.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - images/b1.png
    - images/b2.png
    - images/b3.png
    - images/b4.png
    - images/b5.png
    - images/b6.png
    - images/robot0.png
    - images/robot1.png
    - images/robot2.png
    - images/robot3.png
    - assets/fonts/
  fonts:
    - family: Jomhuria
      fonts:
        - asset: assets/fonts/Jomhuria-Regular.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
